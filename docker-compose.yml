services:
  postgres:
    image: postgres:16-alpine
    container_name: slotflow-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slotflow}
      POSTGRES_USER: ${POSTGRES_USER:-slotflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slotflow_pass}
    ports:
      - "5432:5432"
    volumes:
      - slotflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slotflow_user} -d ${POSTGRES_DB:-slotflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  slotflow_pgdata: